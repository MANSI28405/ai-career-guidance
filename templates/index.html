<!DOCTYPE html>
<html>
<head>
    <title>AI Career Guidance</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            padding-top: 40px;
            color: white;
        }

        .container {
            background: white;
            color: black;
            width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 25px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 10px;
        }

        button:hover {
            background: #5a67d8;
        }

        .result-box {
            margin-top: 25px;
            text-align: left;
        }

        .card {
            background: #f1f5f9;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .bar {
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin-top: 5px;
        }

        .fill {
            height: 10px;
            background: green;
            border-radius: 5px;
        }

        h2 {
            color: #2f855a;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚀 AI Career Guidance</h1>

    <form method="POST">
       <input type="text" name="skills" 
       placeholder="Enter skills (comma or space separated)" 
       value="{{ skills }}">

<input type="text" name="interests" 
       placeholder="Enter interests" 
       value="{{ interests }}">
        <button type="submit">Get Career Suggestions</button>
    </form>

    {% if results %}
    <div class="result-box">

        <h2>🎯 Career Suggestions</h2>

        <!-- Chart -->
        <canvas id="careerChart" width="400" height="200"></canvas>

        <br>

        {% for r in results %}
        <div class="card">
            <h3>{{ r.role }}</h3>

            <p><b>Match:</b> {{ r.match }}%</p>

            <div class="bar">
                <div class="fill" style="width: {{ r.match }}%;"></div>
            </div>

            <p><b>Required Skills:</b> {{ r.skills | join(', ') }}</p>
            <p><b>Missing Skills:</b> {{ r.missing | join(', ') }}</p>
            <p><b>Roadmap:</b> {{ r.roadmap }}</p>
        </div>
        {% endfor %}

    </div>

    <!-- SAFE JSON (NO ERRORS) -->
    <script>
        const data = {{ results | tojson }};

        const roles = data.map(item => item.role);
        const scores = data.map(item => item.match);

        const ctx = document.getElementById('careerChart').getContext('2d');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: roles,
                datasets: [{
                    label: 'Match %',
                    data: scores
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });
    </script>

    {% endif %}

</div>

</body>
</html>
