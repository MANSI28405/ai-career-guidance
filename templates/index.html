<!DOCTYPE html>
<html>
<head>
    <title>AI Career Guidance</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .card {
            background: #f9f9f9;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
        }

        .progress {
            height: 8px;
            background: #ddd;
            border-radius: 5px;
            margin-top: 5px;
        }

        .progress-bar {
            height: 8px;
            background: green;
            border-radius: 5px;
        }
    </style>
</head>

<body>
<div class="container">

    <h1>🚀 AI Career Guidance</h1>

    <form method="POST">
        <input type="text" name="skills" placeholder="Enter skills">
        <input type="text" name="interests" placeholder="Enter interests">
        <button type="submit">Get Suggestions</button>
    </form>

    {% if results %}
        <h2>🎯 Suggestions</h2>

        {% for r in results %}
        <div class="card">
            <h3>{{ r.role }}</h3>
            <p>Match: {{ r.score }}%</p>

            <div class="progress">
                <div class="progress-bar" style="width: {{ r.score }}%"></div>
            </div>

            <p><b>Required:</b> {{ r.required }}</p>
            <p><b>Missing:</b> {{ r.missing }}</p>
            <p><b>Roadmap:</b> {{ r.roadmap }}</p>
        </div>
        {% endfor %}
    {% endif %}

</div>
</body>
</html>
