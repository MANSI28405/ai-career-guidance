<html>
<body style="background:linear-gradient(to right,#667eea,#764ba2); padding:20px; color:white;">

<h2>AI Career Guidance</h2>

<form method="POST" style="background:white; color:black; padding:15px; width:300px;">
    <input name="skills" placeholder="Enter skills"><br><br>
    <input name="interests" placeholder="Enter interests"><br><br>
    <button type="submit">Get Suggestions</button>
</form>

<br>

<h3>Career Suggestions</h3>

{% for job in results %}
<div style="background:white; color:black; padding:10px; margin-bottom:10px;">
    <h4>{{ job.role }}</h4>
    <p>Match: {{ job.match }}%</p>
    <p><b>Required:</b> {{ job.required }}</p>
    <p><b>Missing:</b> {{ job.missing }}</p>
    <p><b>Roadmap:</b> {{ job.roadmap }}</p>
</div>
{% endfor %}

<br>

<a href="/download"><button>Download Report</button></a>
<a href="/logout"><button>Logout</button></a>

</body>
</html>
