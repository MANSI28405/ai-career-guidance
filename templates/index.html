<!DOCTYPE html>
<html>
<head>
    <title>AI Career Guidance</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 450px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #5a67d8;
        }

        .card {
            background: #f8f8f8;
            padding: 15px;
            margin-top: 15px;
            border-radius: 12px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .progress {
            height: 8px;
            background: #ddd;
            border-radius: 5px;
        }

        .bar {
            height: 8px;
            background: green;
            border-radius: 5px;
        }

        .missing {
            color: red;
            font-weight: bold;
        }

        .download-btn {
            margin-top: 15px;
            background: #28a745;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🚀 AI Career Guidance</h1>

    <form method="POST">
        <input type="text" name="skills" placeholder="Enter skills">
        <input type="text" name="interests" placeholder="Enter interests">
        <button type="submit">Get Suggestions</button>
    </form>

    {% if results %}
        <h2>🎯 Suggestions</h2>

        {% for r in results %}
        <div class="card">
            <h3>{{ r.role }}</h3>
            <p>Match: {{ r.score }}%</p>

            <div class="progress">
                <div class="bar" style="width: {{ r.score }}%"></div>
            </div>

            <p><b>Required:</b> {{ r.required }}</p>
            <p class="missing">Missing: {{ r.missing }}</p>
            <p><b>Roadmap:</b> {{ r.roadmap }}</p>
        </div>
        {% endfor %}

        <a href="/download">
            <button class="download-btn">⬇ Download Report</button>
        </a>

    {% endif %}

</div>

</body>
</html>
